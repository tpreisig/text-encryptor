<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./script.js" defer></script>
    <title>Text Encryptor</title>
</head>
<body>
  <div class="container">
        <h1>Text Encryptor</h1>
        <label for="message">Message:</label>
        <textarea id="message" rows="5" aria-label="Enter message to encrypt or decrypt">Caesar used it!</textarea>
        <label for="key">Key:</label>
        <input type="text" id="key" value="1a" aria-label="Enter encryption key">
        <div class="error" id="keyError">Key must be non-empty and use only allowed characters.</div>
        <div class="buttons">
            <button id="encrypt-btn" aria-label="Encrypt the message">Encrypt</button>
            <button id="decrypt-btn" aria-label="Decrypt the message">Decrypt</button>
            <button id="clear-btn" aria-label="Clear inputs and result">Clear</button>
        </div>
        <label for="result">Result:</label>
        <div id="result" aria-live="polite"></div>
        <button id="copy-btn" aria-label="Copy result to clipboard">Copy Result</button>
        <div id="copy-status">Copied to clipboard!</div>
    </div>
</body>
</html>
